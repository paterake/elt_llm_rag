# FA Consolidated Catalog — runtime configuration
#
# Tuning parameters and entity lists for fa_consolidated_catalog.py.
# Edit this file to add aliases, exclude entities from RAG, or flag
# governance-intensive entities — no Python code changes required.

# ---------------------------------------------------------------------------
# handbook_sections
#
# Section-based retrieval: two-stage dynamic routing for FA Handbook.
#
# Stage 1 (discover_relevant_sections): BM25-only scan across all fa_handbook_sNN
#   collections. Fast — no LLM, no embeddings. Identifies which sections mention
#   the entity above threshold.
# Stage 2 (query_collections): LLM synthesis against the top-N sections found
#   in Stage 1. Much higher precision than querying the monolithic fa_handbook
#   collection because top-k chunks are drawn from focused, relevant sections.
#
# section_prefix:            ChromaDB collection prefix → resolves fa_handbook_s01…s44
# section_routing_threshold: Minimum BM25 score to include a section (0.0 = any hit)
# section_routing_top_n:     Max sections to pass to Stage 2 (null = all above threshold)
# section_bm25_top_k:        BM25 candidates per section during Stage 1 scoring
# ---------------------------------------------------------------------------
handbook_sections:
  section_prefix: "fa_handbook"
  section_routing_threshold: 0.0
  section_routing_top_n: 5
  section_bm25_top_k: 3

# ---------------------------------------------------------------------------
# entity_aliases
#
# Bidirectional name mappings used in Step 4 term matching.
# Key: normalised entity name (lowercase). Value: list of handbook synonyms.
# The matching logic checks both directions automatically.
# ---------------------------------------------------------------------------
entity_aliases:
  # County / FA
  fa county:            ["county association", "county football association"]
  county association:   ["fa county", "county fa"]

  # Competition / League
  competition league:   ["competition", "league"]
  competition:          ["competition league", "league"]

  # Governing body
  sports governing body:  ["national association", "affiliated association", "governing body"]
  affiliated association: ["sports governing body", "national association"]

  # Match official
  match official: ["referee", "assistant referee", "fourth official", "var"]
  referee:        ["match official"]

  # Coach / Developer
  coach developer: ["coach", "instructor", "trainer"]
  coach:           ["coach developer"]

  # Learner / Trainee
  learner: ["trainee", "candidate", "student"]

  # Board / Committee
  board & committee members: ["board", "committee", "directors", "management committee"]
  board:     ["board & committee members"]
  committee: ["board & committee members"]

  # Club official
  club official: ["officer", "director", "secretary", "club officer"]
  officer:       ["club official"]

  # Employee / Worker
  employees:                   ["staff", "worker", "employee"]
  casual & contingent labourers: ["casual worker", "contingent worker", "temporary worker"]
  managed service workers:     ["contractor", "third party worker", "agency worker"]

  # Supporter / Fan
  england supporter: ["supporter", "fan", "member"]
  event attendee:    ["attendee", "spectator", "guest"]

  # Customer / Commercial
  customer: ["client", "consumer", "purchaser"]
  prospect: ["potential customer", "lead", "candidate"]

  # Organisation
  business unit:   ["division", "department", "unit"]
  household:       ["family", "domestic unit"]
  supplier:        ["vendor", "provider", "contractor"]
  school:          ["educational institution", "academy"]
  local authority: ["council", "municipality"]
  government:      ["state", "public authority"]

  # Role
  mentor:     ["advisor", "guide", "tutor"]
  candidates: ["applicant", "nominee"]

# ---------------------------------------------------------------------------
# no_handbook_coverage
#
# Entities confirmed to have no FA Handbook coverage.
# RAG calls are skipped entirely for these — prevents hallucination and
# saves LLM calls. Add entities here when confirmed absent from the handbook.
# ---------------------------------------------------------------------------
no_handbook_coverage:
  - Supplier
  - Household
  - Business Unit
  - Prospect
  - Customer
  - Event Attendee
  - Casual & Contingent Labourers
  - Managed Service Workers

# ---------------------------------------------------------------------------
# forced_handbook_entities
#
# Entities confirmed to be present in the FA Handbook but whose definition
# is NOT in "X means Y" format — so they are never extracted by the regex
# in Step 3 and never matched in Step 4.
#
# Entities listed here are always classified as source=BOTH and have the
# normal RAG+LLM Step 5 queries run for them.
# ---------------------------------------------------------------------------
forced_handbook_entities:
  - Sports Governing Body

