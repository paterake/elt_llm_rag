# FA Consolidated Catalog — runtime configuration
#
# Tuning parameters and entity lists for fa_consolidated_catalog.py.
# Edit this file (or entity_aliases.yaml) to adjust behaviour — no Python
# code changes required.
#
# entity_aliases_file: path to the alias map (relative to this config dir).
#   Loaded and merged at startup. Edit entity_aliases.yaml to add new pairs.
# ---------------------------------------------------------------------------
entity_aliases_file: entity_aliases.yaml

# ---------------------------------------------------------------------------
# handbook_sections
#
# Section-based retrieval: two-stage dynamic routing for FA Handbook.
#
# Stage 1 (discover_relevant_sections): BM25-only scan across all fa_handbook_sNN
#   collections. Fast — no LLM, no embeddings. Identifies which sections mention
#   the entity above threshold.
# Stage 2 (query_collections): LLM synthesis against the top-N sections found
#   in Stage 1. Much higher precision than querying the monolithic fa_handbook
#   collection because top-k chunks are drawn from focused, relevant sections.
#
# section_prefix:             ChromaDB collection prefix → resolves fa_handbook_s01…s44
# section_routing_threshold:  Minimum BM25 score to include a section (0.0 = any hit)
# section_routing_top_n:      Retained for future use; not enforced — BM25 routing is now
#                               the query scope (not a pre-filter over all 44 sections)
# section_bm25_top_k:         BM25 candidates per section during Stage 1 scoring
# section_routing_min_sections: If BM25 + entity_aliases find fewer than this many
#                               sections, trigger an LLM alias-expansion call to generate
#                               domain-aware synonyms and re-run BM25. Set to 0 to disable
#                               (recommended — keyword scan Stage 1c handles sparse entities
#                               more reliably and without the extra LLM call overhead).
# ---------------------------------------------------------------------------
handbook_sections:
  section_prefix: "fa_handbook"
  section_routing_threshold: 0.0
  section_routing_top_n: 5
  section_bm25_top_k: 3
  section_routing_min_sections: 0  # 0 = disabled; keyword scan (Stage 1c) covers sparse entities
                                   # reliably without the overhead of an extra LLM alias call

# ---------------------------------------------------------------------------
# no_handbook_coverage
#
# Entities confirmed to have no FA Handbook coverage.
# RAG calls are skipped entirely for these — prevents hallucination and
# saves LLM calls. Add entities here when confirmed absent from the handbook.
# ---------------------------------------------------------------------------
no_handbook_coverage:
  # Entities confirmed absent even when queried with all aliases.
  # Supplier, Customer, Event Attendee, Casual & Contingent Labourers, Prospect
  # were removed — alias-based retrieval finds genuine handbook content for them.
  - Household
  - Business Unit
  - Managed Service Workers

# ---------------------------------------------------------------------------
# forced_handbook_entities
#
# Entities confirmed to be present in the FA Handbook but whose definition
# is NOT in "X means Y" format — so they are never extracted by the regex
# in Step 3 and never matched in Step 4.
#
# Entities listed here are always classified as source=BOTH and have the
# normal RAG+LLM Step 5 queries run for them.
# ---------------------------------------------------------------------------
forced_handbook_entities:
  - Sports Governing Body
  - FA County
  - Local Authority

# ---------------------------------------------------------------------------
# static_context
#
# Pre-populated field overrides for entities that are *referenced* in the
# handbook but not *governed* by it (e.g. external statutory bodies).
# RAG will find mentions but cannot synthesise meaningful governance rules —
# populate here to prevent hallucination.
#
# These entries are merged AFTER Step 5 RAG and override the specified fields.
# Omit a field to leave the RAG result untouched.
# Supported fields: formal_definition, domain_context, governance_rules
# ---------------------------------------------------------------------------
static_context:
  Government:
    domain_context: >-
      UK central and devolved government bodies, including Parliament, the Home Office,
      and relevant public authorities. Referenced in the FA Handbook primarily in the
      context of statutory obligations, safeguarding legislation, data protection law
      (UK GDPR / Data Protection Act 2018), and equality legislation.
    governance_rules: >-
      Not governed by FA Rules. The FA is required to comply with government legislation
      and statutory instruments. Where the FA Handbook references government bodies it
      does so to acknowledge legal obligations the FA and its participants must observe
      (e.g. safeguarding duties under the Children Act 1989, equality duties under the
      Equality Act 2010, data protection obligations under UK GDPR).

  School:
    domain_context: >-
      Educational institutions (primary, secondary, academies, colleges, universities)
      that participate in or support grassroots football. Referenced in the FA Handbook
      in the context of youth football, safeguarding, player welfare, and educational
      partnership programmes.
    governance_rules: >-
      Not governed by FA Rules as an institution. Schools participating in FA-affiliated
      football competitions must comply with FA safeguarding and youth football regulations
      as they apply to their players and affiliated teams. Schools are subject to their
      own statutory safeguarding duties (Children Act 1989, Keeping Children Safe in
      Education) which the FA recognises and does not override.

  Charity:
    domain_context: >-
      Charitable organisations and voluntary sector bodies referenced in the FA Handbook
      primarily in the context of community football programmes, foundation activities,
      and club charitable arms (e.g. Premier League and EFL club foundations).
    governance_rules: >-
      Not directly governed by FA Rules as charitable entities. Charitable arms of FA
      affiliates (e.g. club foundations) must still comply with FA Rules as they apply
      to affiliated football activity. Charitable status is governed by the Charity
      Commission and Charities Act 2011, which the FA does not regulate.

