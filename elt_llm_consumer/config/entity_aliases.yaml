# FA Entity Alias Map — grounded against FA Conceptual Model (175 entities) and FA Handbook
#
# Purpose (two uses):
#   Step 4 — term matching: maps handbook-extracted defined terms → model entity names
#   Step 5 — BM25 section routing: expands entity name with handbook vocabulary
#
# Format:
#   Key:   normalised entity name (lowercase, as it appears in the conceptual model)
#   Value: list of alternative terms the FA Handbook uses for the same concept
#
# The matching logic checks both directions — you only need to list each pair once,
# but explicit reverse entries improve BM25 section routing scores.
#
# To add a new pair: edit this file. No Python code changes required.
# ---------------------------------------------------------------------------


# ===========================================================================
# PARTY — Individual
# ===========================================================================

# Match officials
match official:      ["referee", "assistant referee", "fourth official", "var",
                      "video assistant referee", "official", "match officials"]
referee:             ["match official", "official"]

# Players
player:              ["registered player", "participant", "footballer",
                      "professional player", "amateur player", "youth player"]

# Coaches
coach developer:     ["coach educator", "fa coach educator", "tutor", "instructor",
                      "assessor", "coach", "coach developer"]
coach:               ["coach developer", "manager", "head coach"]

# Learners
learner:             ["student", "trainee", "course participant", "candidate"]

# Club officials
club official:       ["officer", "club officer", "secretary", "chairman",
                      "director", "appointed official"]
officer:             ["club official"]

# County
county administrator: ["county officer", "county official", "county secretary",
                       "county fa administrator", "county administrator"]

# Board / Committee
board & committee members: ["board member", "committee member", "director",
                             "management committee", "board", "committee",
                             "directors", "trustees"]
board:     ["board & committee members"]
committee: ["board & committee members"]

# Staff
