                                 "full time staff", "part time staff"]
casual & contingent labourers: ["casual worker", "contingent worker",
                                 "temporary staff", "agency staff",
                                 "casual staff", "temporary worker"]
managed service workers:       ["contractor", "third party worker", "agency worker",
                                 "outsourced worker", "managed service"]

# Supporters
