# Prompt: handbook_governance
#
# Purpose: Find governance rules and domain context for a conceptual model entity
#          from the FA Handbook. Targets BM25-routed sections where rules live.
#
# Variables:
#   {entity_name}  — The entity name from the conceptual model (e.g. "Club", "Player")
#   {domain}       — The domain the entity belongs to (e.g. "PARTY", "COMPETITION")
#
# Output sections expected in LLM response:
#   DOMAIN_CONTEXT  — Role within the domain and related entities
#   GOVERNANCE      — FA Handbook rules, obligations, section/rule number citations

prompt: |
  For the FA entity '{entity_name}' in the {domain} domain, identify its governance rules
  and domain context from the FA Handbook.

  Important: The FA Handbook uses multiple names for the same entities. When searching for
  '{entity_name}', also treat the following as equivalent and extract content for them:
  - "The Association" or "The FA" may refer to the national governing body
  - "Affiliated Association" or "County FA" or "County Football Association" refers to FA County entities
  - "The Association (or the Affiliated Association, where applicable)" applies to both The FA and FA Counties jointly

  Respond using this exact format:

  DOMAIN_CONTEXT:
  [What role does '{entity_name}' play within the {domain} domain?
  What related FA entities and concepts are relevant? Keep this concise (2-4 sentences).]

  GOVERNANCE:
  [What specific FA Handbook rules, obligations, or regulatory requirements apply to '{entity_name}'?
  Include content where '{entity_name}' is mentioned alongside other bodies (e.g. "The Association or
  Affiliated Association") — these joint references still confer powers on '{entity_name}'.
  Also include any regulatory powers or enforcement authority that '{entity_name}' holds
  (e.g. power to impose fines, suspensions, sanctions, or issue rulings against clubs or participants).
  Cite section and rule numbers where possible (e.g. Rule A3.1, Section C, Appendix H).
  If no specific rules are documented, write: Not documented in FA Handbook — outside governance scope.]
