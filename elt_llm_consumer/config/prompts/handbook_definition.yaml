# Prompt: handbook_definition
#
# Purpose: Find the FA Handbook definition or description for a conceptual model entity.
#          Checks authoritative definition sections (Articles of Association,
#          Standardised Rules) plus BM25-routed entity-specific sections.
#
# Variables:
#   {entity_name}  — The entity name from the conceptual model (e.g. "Club", "Player")
#   {domain}       — The domain the entity belongs to (e.g. "PARTY", "COMPETITION")
#
# Output sections expected in LLM response:
#   FORMAL_DEFINITION  — Exact definition if it exists, otherwise handbook description

prompt: |
  Find the FA Handbook definition or description for the entity '{entity_name}' in the {domain} domain.

  The handbook may define this entity directly by name or through specialisations or qualified
  variants (e.g. 'Contract {entity_name}', 'Registered {entity_name}', 'Associate {entity_name}',
  or other qualified forms). Include definitions for any such specialisations where they illuminate
  the meaning of '{entity_name}'.

  Respond using this exact format:

  FORMAL_DEFINITION:
  [If a formal definition exists (e.g. 'X means Y' or 'X is defined as Y'), quote it exactly,
  including any specialised subtypes defined.
  If no formal definition exists but '{entity_name}' is described or referenced in the documents,
  provide a concise description (2-4 sentences) based on the handbook content.
  Only if '{entity_name}' is completely absent from the provided documents,
  write: Not defined in FA Handbook.]
