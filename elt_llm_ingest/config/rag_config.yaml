# Shared RAG Configuration

# ChromaDB settings
chroma:
  persist_dir: "../../.chroma_db"
  tenant: "rag_tenants"
  database: "knowledge_base"

# Ollama settings
ollama:
  base_url: "http://localhost:11434"
  embedding_model: "nomic-embed-text"  # keep this, it's good
  llm_model: "qwen3.5:9b"        # ~6.6GB — newer generation (2025); faster than 14B
  embed_batch_size: 1
  context_window: 32768         # 32K — qwen3.5:9b supports 256K natively; 32K is safe on M3 18GB
                                # and allows ~100 chunks of 256 tokens + generous LLM output room
  request_timeout: 360.0        # 6 minutes — increased for single-pass (1000 token output vs 800)
  num_predict: 1000             # Cap synthesis response to ~1000 tokens — increased for single-pass
                                # (3 fields: FORMAL_DEFINITION + DOMAIN_CONTEXT + GOVERNANCE).
                                # With 44-chunk input context (11K tokens), prefill is ~110s,
                                # total per call ~310s — raise request_timeout if needed.
  thinking: false               # Disable thinking mode — prevents token budget consumed by <think> blocks

# Chunking settings: Table-aware strategy preserves FA Handbook definition tables
# Rules §8 (pp.86-95) contains a two-column definitions table where each row
# defines an entity (e.g., "Participant", "Club", "Player"). These rows span
# multiple lines and would be split across chunks with standard sentence splitting.
#
# The table_aware strategy:
# - Prose content: chunk_size tokens (256)
# - Table rows: Single chunk per row, up to table_chunk_size tokens (1024)
#
# This ensures definitions like "Participant means any Affiliated Association,
# Competition, Club, Club Official..." remain intact for retrieval.
chunking:
  strategy: "table_aware"  # Options: sentence, table_aware, section_aware
  chunk_size: 256          # Prose chunk size
  chunk_overlap: 32        # Prose overlap
  sentence_split_threshold: 0.5
  table_chunk_size: 512         # Max size for table rows — nomic-embed-text num_ctx=2048, keep well under

# Query settings
query:
  similarity_top_k: 8       # Reduced from 10 to accommodate larger chunk_size (768)
                            # 8 chunks × 768 = 6.1K, leaving ~10K for LLM output
  use_hybrid_search: true  # Combine BM25 keyword + vector search (fixes structured/list content)
  use_reranker: true        # Re-score retrieved chunks before LLM synthesis
  reranker_strategy: "embedding"  # "embedding" (Ollama/local) | "cross-encoder" (sentence-transformers)
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"  # used only when strategy=cross-encoder
  reranker_retrieve_k: 88   # ~2 per section × 44 handbook sections — ensures every section
                            # contributes candidates before reranker scores. Critical when
                            # governance content (e.g. Respect/conduct sections) is sparse
                            # and may not win a pure vector-similarity race against 43 others.
  reranker_top_k: 44        # 1 per section × 44 sections: 44 × 256 avg tokens ≈ 11K to LLM.
                            # Reranker still sees all 88 candidates (reranker_retrieve_k) and
                            # scores them — top 44 by relevance go to LLM. Confirmed s40 Respect
                            # Code ranks ~35-40, so 44 captures it while halving prefill vs 88.

  # Multi-query retrieval: generate num_queries-1 additional query variants via LLM.
  # Higher values improve recall for compound queries at the cost of extra LLM calls.
  # Recommended: 3 for quality, 1 to disable (batch jobs where runtime is critical).
  # Set to 1 for batch consumer runs — eliminates (num_queries-1) × num_sections extra LLM
  # calls per entity. With iterative=True and 5 sections, num_queries=3 added 10 extra calls.
  num_queries: 1

  # MMR: select diverse chunks instead of top-N by score alone.
  # Prevents near-duplicate adjacent paragraphs consuming all top-k slots.
  # mmr_threshold: 0=max diversity, 1=max relevance (0.7 = 70% relevance, 30% diversity).
  use_mmr: true
  mmr_threshold: 0.7

  # Lost-in-the-middle mitigation: reorder chunks so highest-scoring appear at
  # both ends of the context window, where LLM attention is strongest.
  use_lost_in_middle: true

  # Full-context threshold: collections with ≤ this many chunks are passed in full
  # to the LLM (no retrieval). Set to 0 to always use the retrieval path — this
  # ensures LLM input is always bounded by reranker_top_k × chunk_size (~11K tokens)
  # regardless of collection size. Prevents context overflow (status 500) when
  # querying all 44 handbook sections simultaneously.
  full_context_max_chunks: 0

  system_prompt: |
    You are a helpful assistant that answers questions based on the provided documents.
    Always ground your answers in the retrieved content.
    When the documents clearly list items (such as chapters, steps, or roles), enumerate them explicitly.
    When the documents only partially describe something, say that the list may be incomplete and explain what is stated.
    If the information is not available in the documents, say so clearly.
