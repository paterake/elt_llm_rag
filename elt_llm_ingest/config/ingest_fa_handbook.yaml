# Ingestion Config: The Football Association Handbook

collection_name: "fa_handbook"

# Documents to ingest
file_paths:
  - "~/Documents/__data/resources/thefa/FA_Handbook_2025-26.pdf"

# Metadata to attach to all documents
metadata:
  domain: "Regulations"
  type: "handbook"
  source: "TheFA Handbook"

# Whether to rebuild the collection on each run
rebuild: true

# Chunking: Docling's structure-aware markdown preserves section boundaries,
# so 512-token chunks keep full rule paragraphs together.
chunking:
  strategy: "sentence"
  chunk_size: 512
  chunk_overlap: 64

# Preprocessor: Docling converts the PDF with layout-aware extraction,
# preserving section hierarchy, tables, and correct reading order.
# No page-range configuration needed — Docling handles document structure automatically.
preprocessor:
  module: "elt_llm_ingest.preprocessor"
  class: "DoclingPreprocessor"
  output_format: "markdown"
