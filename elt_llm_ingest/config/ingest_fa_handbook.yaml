# Ingestion Config: The Football Association Handbook
#
# Split mode: one ChromaDB collection per handbook section (fa_handbook_s01 … fa_handbook_s44).
# The RegulatoryPDFPreprocessor reads the pre-converted Markdown and splits it on
# the "#### **N - SECTION TITLE**" headers produced by PyMuPDFPreprocessor.
#
# To re-generate the source Markdown from the raw PDF first:
#   uv run python -m elt_llm_ingest.runner --cfg ingest_fa_handbook_pdf

collection_prefix: "fa_handbook"

file_paths:
  - "~/Documents/__data/resources/thefa/FA_Handbook_2025-26_processed_clean.md"

metadata:
  domain: "Regulations"
  type: "handbook"
  source: "TheFA Handbook"

rebuild: true

preprocessor:
  module: "elt_llm_ingest.preprocessor"
  class: "RegulatoryPDFPreprocessor"
  output_format: "markdown"
  collection_prefix: "fa_handbook"
  split_by_sections: true
