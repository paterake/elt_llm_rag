# Ingestion Config: LeanIX Enterprise Conceptual Data Model
#
# json_md mode: two-collection approach backed by flat per-entity Markdown.
# The preprocessor (doc_leanix_parser.py via LeanIXPreprocessor) also writes
# a JSON file next to the source XML for direct consumer use — eliminating
# docstore-scanning regex in the consumer layer.
#
# Collections produced:
#   fa_leanix_dat_enterprise_conceptual_model_entities      — one chunk per entity
#   fa_leanix_dat_enterprise_conceptual_model_relationships — one chunk per relationship
#
# JSON file written next to source XML (for consumers):
#   <xml_dir>/<xml_stem>_model.json

collection_prefix: "fa_leanix_dat_enterprise_conceptual_model"

preprocessor:
  module: "elt_llm_ingest.preprocessor"
  class: "LeanIXPreprocessor"
  output_format: "json_md"
  enabled: true
  model_name: "FA Enterprise Conceptual Data Model"
  org_name: "The Football Association"

file_paths:
  - "~/Documents/__data/resources/thefa/DAT_V00.01_FA Enterprise Conceptual Data Model.xml"

# Metadata attached to all chunks in both collections
metadata:
  domain: "architecture"
  subdomain: "diagrams"
  practise: "data"
  type: "enterprise_architecture"
  source: "LeanIX Enterprise Conceptual Model"

# Each entity/relationship is its own ## section — chunk_size just needs to
# exceed a single entry (~200 chars). Overlap not needed between entities.
chunking:
  chunk_size: 512
  chunk_overlap: 0

rebuild: true
