# Ingestion Config: FA Handbook PDF → Markdown conversion only
#
# Converts the raw PDF to a single processed Markdown file using pymupdf4llm.
# Run this first if FA_Handbook_2025-26_processed_clean.md does not exist or
# needs to be regenerated from a new PDF.
#
# Output: ~/Documents/__data/resources/thefa/FA_Handbook_2025-26_processed_clean.md
#
# After running this, run:
#   uv run python -m elt_llm_ingest.runner --cfg ingest_fa_handbook

collection_name: "fa_handbook_pdf_raw"

file_paths:
  - "~/Documents/__data/resources/thefa/FA_Handbook_2025-26.pdf"

metadata:
  domain: "Regulations"
  type: "handbook_raw"
  source: "TheFA Handbook"

rebuild: false

preprocessor:
  module: "elt_llm_ingest.preprocessor"
  class: "PyMuPDFPreprocessor"
  output_format: "markdown"
